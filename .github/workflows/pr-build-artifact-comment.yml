name: PR Build Artifact Comment

on:
  workflow_run:
    workflows:
      - PR Build Artifact
    types:
      - completed

permissions:
  actions: read
  issues: write

jobs:
  comment:
    name: Comment artifact link
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-build-artifact-comment -->';
            const run = context.payload.workflow_run;
            const pr = run.pull_requests?.[0];

            if (!pr) {
              core.info('No pull request was associated with this workflow run.');
              return;
            }

            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: run.id,
              per_page: 100,
            });

            const artifact = artifacts.find((item) => item.name === `dist-pr-${pr.number}`);

            if (!artifact) {
              core.setFailed(`Could not find dist artifact for PR #${pr.number}.`);
              return;
            }

            const artifactUrl = `https://github.com/${owner}/${repo}/actions/runs/${run.id}/artifacts/${artifact.id}`;
            const body = [
              marker,
              'PR 빌드가 완료되었습니다.',
              '',
              `- 다운로드: [${artifact.name}.zip](${artifactUrl})`,
              `- 빌드 로그: [${run.name} #${run.run_number}](${run.html_url})`,
              '',
              '아티팩트는 7일 후 만료됩니다.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existingComment = comments.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker);
            });

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
